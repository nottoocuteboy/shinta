<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinta - Financial Assistant</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2933/2933116.png">
    <style>
        /* Menghilangkan semua margin dan padding bawaan agar iframe rata penuh */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah munculnya dua scrollbar (dari iframe dan dari body) */
            background-color: #fdfcfb; /* Warna latar dasar sementara menunggu iframe loading */
            font-family: sans-serif;
        }

        /* Memaksa iframe memenuhi 100% layar tanpa garis tepi */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Loading screen sederhana saat script.google.com sedang memuat */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f06292;
            font-weight: 600;
            z-index: -1; /* Berada di bawah iframe, akan tertutup otomatis saat iframe selesai loading */
        }
    </style>
</head>
<body>
    
    <div id="loader">Memuat Shinta... ✨</div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycby3ejygb0dO3McrT3bYFBhTazKb98U0dYjx9Xa3U0Qx-A87T1y5H3CVwkDB5GaCC2uotg/exec" 
        allowfullscreen>
    </iframe>

</body>
</html>
