name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Siapkan Lingkungan Kerja (Pasti Berhasil)
        run: |
          # 1. Inisialisasi npm dasar agar capacitor tidak bingung
          npm init -y
          
          # 2. Install Capacitor versi terbaru
          npm install @capacitor/core @capacitor/android
          npm install -D @capacitor/cli
          
          # 3. Buat folder www dan file pancingan secara paksa
          mkdir -p www
          echo "<html><body>Menyiapkan Shinta...</body></html>" > www/index.html
          
          # 4. Buat ulang konfigurasi capacitor secara paksa untuk memastikan URL benar
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.shinta.app",
            "appName": "Shinta App",
            "webDir": "www",
            "server": {
              "url": "https://nottoocuteboy.github.io/shinta/",
              "cleartext": true
            }
          }
          EOF
          
          # 5. Tambahkan platform Android
          npx cap add android

      - name: Rakit APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Kirim File APK ke saya
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Shinta-Siap-Pakai
          path: android/app/build/outputs/apk/debug/app-debug.apk
